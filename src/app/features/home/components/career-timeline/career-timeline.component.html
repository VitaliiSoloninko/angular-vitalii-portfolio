<section class="career-timeline">
  <div class="career-timeline__container">
    <div class="career-timeline__title title">
      <app-title
        [title]="'Beruflicher Werdegang'"
        [subtitle]="'Karriereweg'"
      ></app-title>
    </div>
    <div class="career-timeline__body">
      <app-career-timeline-navigation
        [items]="items"
        [selectedId]="selectedId()"
        (selected)="onSelectItem($event)"
      />
      @if (selectedItem(); as item) {
        <app-career-item-detail [item]="item" />
      }
    </div>
  </div>
</section>
