<div class="career-timeline__content content-career-timeline">
  <div class="content-career-timeline__body">
    <div class="content-career-timeline__header">
      <div class="content-career-timeline__title">
        {{ item().title }}
        @if (item().linkTitle) {
          <div class="content-career-timeline__link-title">
            {{ item().linkTitle }}
          </div>
        }
      </div>
      <div class="content-career-timeline__location">
        {{ item().location }}
      </div>
      <div class="content-career-timeline__time">{{ item().time }}</div>
      <div class="content-career-timeline__categories">
        @for (category of item().categories; track category) {
          <div class="category-link">
            {{ category }}
          </div>
        }
      </div>
    </div>
    <div class="content-career-timeline__main">
      <ul class="content-career-timeline__list list-content-career-timeline">
        @for (listItem of item().list; track listItem) {
          <li class="list-content-career-timeline__item">
            {{ listItem }}
          </li>
        }
      </ul>
    </div>
  </div>
</div>
