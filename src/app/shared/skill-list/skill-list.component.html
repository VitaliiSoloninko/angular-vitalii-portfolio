<div class="skill-list">
  <div class="title__label" *ngIf="title">{{ title }}</div>
  <div
    class="skill-list__padding"
    [class.skill-list__padding--active]="withPadding"
  >
    <div class="skill-list__items">
      <div class="skill-list__item" *ngFor="let skill of skills">
        <div
          class="skill-list__label"
          [class.skill-list__label--purple]="theme === 'purple'"
          [class.skill-list__label--dark]="theme === 'dark'"
        >
          {{ skill }}
        </div>
        <div
          class="skill-list__line"
          [class.skill-list__line--purple]="theme === 'purple'"
          [class.skill-list__line--dark]="theme === 'dark'"
        ></div>
      </div>
    </div>
  </div>
</div>
